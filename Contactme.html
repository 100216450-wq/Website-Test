<body>
<div class="back">

    </div>
<div class="welcome">
    <h1>Welcome to the Contact me page - leave any feedback or a message here:</h1>
</div>
<div class="holder">
    <form action="/action_thankyou.html" oninput="x.value=(parseInt(a.value)||0) 
    + (parseInt(b.value)||0)">

       <label for="fname">First Name</label>
        <input type="text" id="fname"
        name="firstname" placeholder="Your name..">
    <label for="interests">Interests</label>
        <select id="interests" name="interests">
            <option
    value="social media">Social media</option>
        <option value="programming">Programming</option>
        <option value="gaming">Gaming</option>
        </select>

        <label for="Give_feedback">Give feedback</label>
        <textarea id="Give_feedback" name="Give_feedback" placeholder="Write_something..." style="height:200px"></textarea>
        
    <div class="change">
    <h2>Please Rate this website from 0 to 10. 10 being best</h2>
    0
   
    <input type="range" id="a" name="a" value="0" min="0" max="10">
    10 +
    <br>
    <input type="number" id="b" name="b" value="10">
    =
    <output name="x" for="a b">10</output>
    </div>
    <br>
    <input type="submit" value="Submit">
    </form>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.location.href = 'thank_you.html';
});
</script>

</body>
